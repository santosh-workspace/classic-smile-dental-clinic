<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .qr-square { fill: #000; }
      .qr-white { fill: #fff; }
      .qr-text { font-family: Arial, sans-serif; font-size: 32px; font-weight: bold; fill: #0066ff; text-anchor: middle; }
      .qr-subtext { font-family: Arial, sans-serif; font-size: 18px; fill: #666; text-anchor: middle; }
      .qr-instagram { font-size: 24px; }
    </style>
  </defs>
  
  <!-- White background -->
  <rect width="400" height="400" class="qr-white"/>
  
  <!-- QR code pattern (simplified checkerboard pattern) -->
  <g id="qr-pattern">
    <rect x="20" y="20" width="100" height="100" class="qr-square"/>
    <rect x="120" y="20" width="20" height="20" class="qr-square"/>
    <rect x="160" y="20" width="80" height="80" class="qr-square"/>
    <rect x="280" y="20" width="100" height="100" class="qr-square"/>
    
    <rect x="20" y="140" width="20" height="20" class="qr-square"/>
    <rect x="80" y="140" width="120" height="20" class="qr-square"/>
    <rect x="220" y="140" width="60" height="60" class="qr-square"/>
    <rect x="320" y="140" width="60" height="60" class="qr-square"/>
    
    <rect x="40" y="200" width="80" height="40" class="qr-square"/>
    <rect x="140" y="200" width="40" height="40" class="qr-square"/>
    <rect x="200" y="200" width="60" height="100" class="qr-square"/>
    <rect x="300" y="200" width="80" height="100" class="qr-square"/>
    
    <rect x="20" y="280" width="100" height="100" class="qr-square"/>
    <rect x="140" y="280" width="40" height="40" class="qr-square"/>
    <rect x="200" y="320" width="40" height="40" class="qr-square"/>
  </g>
  
  <!-- Center Instagram logo indicator -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#0066ff" stroke-width="2"/>
  <text x="200" y="195" class="qr-instagram">📱</text>
  
  <!-- Text -->
  <text x="200" y="370" class="qr-text">@CLASSICSMILE_DCIC</text>
</svg>